<style>
      body {
        background-color: #070707;
        font-family: 'Sora', sans-serif;
        color: #e5e2e1;
        overflow-x: hidden;
      }

      }

        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),

        background-size: 40px 40px;
      }

        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

        background: #111827;
        border: 1px solid rgba(255, 255, 255, 0.08);

        border-color: #0033ad;

      }

<body class="min-h-screen flex flex-col selection:bg-primary/30">
<!-- Decorative Background -->
<div class="fixed inset-0 z-[-1]">
<div class="absolute inset-0 grid-pattern"></div>
<div class="absolute inset-0 mesh-gradient"></div>
<div class="absolute top-[-10%] right-[-10%] w-[40rem] h-[40rem] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40rem] h-[40rem] bg-primary/5 blur-[120px] rounded-full"></div>
</div>
<!-- Header Navigation (Simplified for Auth) -->
<header class="fixed top-0 w-full z-50">
<div class="max-w-container-max mx-auto px-margin-desktop h-20 flex items-center">
<div class="font-headline-md text-headline-md font-bold tracking-tighter text-white">
                TradinX
            </div>
</div>
</header>
<!-- Main Content: Centered Auth Card -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-margin-mobile md:px-0">
<div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="glass-card rounded-xl p-6 md:p-8 shadow-2xl relative overflow-hidden"><!-- Inner Decorative Glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/20 blur-[60px] rounded-full pointer-events-none"></div>
<div class="relative z-10">
<!-- Brand Identity -->
<div class="text-center mb-6">
<h1 class="font-headline-md text-on-surface mb-1 text-headline-md">Welcome Back</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant">Precision insights for your next trade.</p>
</div>
<!-- Sign In Form -->
<form action="#" class="space-y-4" method="POST">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1 ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
<input class="neo-input w-full pl-10 pr-4 py-2.5 rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/50 bg-surface-container-low" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1 ml-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
<input class="neo-input w-full pl-10 pr-4 py-2.5 rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/50 bg-surface-container-low" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="flex items-center gap-3 py-1">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container text-primary focus:ring-primary/20" id="remember" type="checkbox">
<label class="font-label-md text-label-md text-on-surface-variant cursor-pointer" for="remember">Stay signed in</label>
</div>
<button class="w-full py-3 bg-primary-container font-label-md text-label-md rounded-lg primary-btn-glow transition-all duration-300 flex justify-center items-center gap-2 text-white" type="submit">Sign In <span class="material-symbols-outlined text-md">arrow_forward</span></button>
</form>
<!-- Divider -->
<div class="relative my-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/10"></div>
</div>
<div class="relative flex justify-center text-label-sm text-label-sm">
<span class="px-4 bg-[#111827] text-on-surface-variant uppercase tracking-widest">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid gap-4">
<button class="w-full py-3 glass-card rounded-lg flex justify-center items-center gap-3 hover:bg-white/5 duration-300 border border-outline-variant/20">

<path d="M5.33 14.62C5.08 13.88 4.95 13.1 4.95 12.3s.13-1.58.38-2.32L1.48 6.99c-.8 1.66-1.25 3.53-1.25 5.51s.45 3.85 1.25 5.51l3.85-3z" fill="#FBBC05"></path>
<path d="M12 23c3.12 0 5.73-1.02 7.65-2.77l-3.71-2.87c-1.08.73-2.47 1.16-3.94 1.16-3.11 0-5.76-2.61-6.67-5.59l-3.85 3C3.38 20.31 7.37 23 12 23z" fill="#34A853"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Continue with Google</span>
</button>
</div>

<div class="mt-8 text-center">
<p class="font-body-md text-on-surface-variant text-label-sm">
                            Don't have an account? 
                            <a class="text-primary font-bold hover:text-primary-fixed transition-colors" href="#">Sign Up</a>
</p>
</div>
</div></div>
<!-- Trust Badge -->
<div class="mt-8 text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
    By signing in, you agree to our 
    <a class="text-primary hover:underline transition-all" href="#">Terms</a> 
    and 
    <a class="text-primary hover:underline transition-all" href="#">Privacy Policy</a>
</p>
</div>
</div>
</main>
<!-- Global Footer Component -->
<!-- Micro-interaction Scripts -->
<script>
        // Form Submission visual feedback
        const form = document.querySelector('form');
        const btn = form.querySelector('button');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">progress_activity</span> Authenticating...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Success`;
                btn.classList.replace('bg-primary-container', 'bg-green-600');
            }, 1500);
        });
    </script>
